<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경비 청구 요약</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eeede9;
    --border: #dddbd5;
    --border2: #e8e7e3;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #9e9c96;
    --accent: #2a5ccc;
    --accent-bg: #eef2fc;
    --green: #1a7a4a;
    --green-bg: #e8f5ee;
    --warn-bg: #fef6e4;
    --warn: #92600a;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  header span {
    font-size: 13px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    transition: border-color .2s, background .2s;
  }
  .drop-zone:hover, .drop-zone.drag {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .drop-zone .icon { font-size: 32px; margin-bottom: .75rem; }
  .drop-zone h2 { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .drop-zone p { font-size: 13px; color: var(--text3); }

  /* Results */
  #results { display: none; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .fname {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
  }
  .btn-reset {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: border-color .15s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* Toggles */
  .toggles {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .toggle-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .toggle-pill:has(input:checked) {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .toggle-pill input { display: none; }
  .pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background .15s;
    flex-shrink: 0;
  }
  .toggle-pill:has(input:checked) .pill-dot { background: var(--accent); }
  .pill-label { font-size: 13px; color: var(--text2); }
  .toggle-pill:has(input:checked) .pill-label { color: var(--accent); font-weight: 500; }
  .pill-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
  }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .metric-value { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
  .metric-value.large { font-size: 28px; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 1rem; }

  /* Category bars */
  .cat-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border2); }
  .cat-row:last-child { border-bottom: none; }
  .cat-name { font-size: 13px; color: var(--text2); width: 190px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-wrap { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .cat-bar { height: 5px; border-radius: 3px; background: var(--accent); transition: width .4s ease; }
  .cat-amount { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 500; min-width: 90px; text-align: right; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border2); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  .badge-review { background: var(--warn-bg); color: var(--warn); }
  .badge-pd { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .badge-approved { background: var(--green-bg); color: var(--green); }

  .mono { font-family: 'DM Mono', monospace; }
  .text-right { text-align: right; }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border2);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>경비 청구 요약</h1>
    <span>Expense Tracker</span>
  </header>

  <div id="drop-zone" class="drop-zone" onclick="document.getElementById('fi').click()">
    <div class="icon">📂</div>
    <h2>CSV 파일을 여기에 드래그하거나 클릭해서 업로드</h2>
    <p>Mesh 경비 관리 시스템에서 내보낸 CSV 파일</p>
    <input type="file" id="fi" accept=".csv" style="display:none">
  </div>

  <div id="results">
    <div class="top-bar">
      <span class="fname" id="fname"></span>
      <button class="btn-reset" onclick="resetUpload()">↩ 다른 파일 업로드</button>
    </div>

    <div class="toggles">
      <label class="toggle-pill">
        <input type="checkbox" id="tog-pd" checked>
        <span class="pill-dot"></span>
        <span class="pill-label">Per Diem 포함</span>
        <span class="pill-sub" id="pd-hint"></span>
      </label>
      <label class="toggle-pill">
        <input type="checkbox" id="tog-cc">
        <span class="pill-dot"></span>
        <span class="pill-label">Cancelled 표시</span>
        <span class="pill-sub" id="cc-hint"></span>
      </label>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="card">
      <div class="card-title">카테고리별</div>
      <div id="cat-bd"></div>
    </div>

    <div class="card">
      <div class="card-title">경비 목록</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>날짜</th>
              <th>가맹점</th>
              <th>카테고리</th>
              <th>메모</th>
              <th class="text-right">금액 (KRW)</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>CSV 데이터는 브라우저 내에서만 처리되며 외부로 전송되지 않습니다.</footer>
</div>

<script>
var AD = [];

function fmt(n){ return Math.round(Number(n)).toLocaleString('ko-KR'); }

function isPD(r){
  var combined = [r['Spend Category']||'',r['Travel Category']||'',r['Merchant']||'',r['Memo']||''].join('|').toLowerCase();
  return combined.indexOf('per diem') !== -1;
}

function isCC(r){
  return (r['Status']||'').toLowerCase().indexOf('cancel') !== -1;
}

function getCategory(r){
  if(isPD(r)) return 'Per Diem';
  var raw = r['Spend Category']||'';
  if(raw.indexOf('Transportation Monthly') !== -1) return '교통 (월정액)';
  if(raw.indexOf('Transportation') !== -1) return '교통비';
  if(raw.toLowerCase().indexOf('entertainment') !== -1 || raw.toLowerCase().indexOf('meal') !== -1) return '식비/접대';
  if(raw.indexOf('Cellphone') !== -1) return '통신비';
  return raw.split(':').pop().trim() || '기타';
}

function parseCSV(txt){
  var lines = txt.trim().split('\n');
  var headers = [], cur = '', inQ = false, i;
  for(i = 0; i < lines[0].length; i++){
    var ch = lines[0][i];
    if(ch === '"'){ inQ = !inQ; }
    else if(ch === ',' && !inQ){ headers.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  headers.push(cur.trim());
  var rows = [];
  for(var l = 1; l < lines.length; l++){
    var cols = []; cur = ''; inQ = false;
    for(i = 0; i < lines[l].length; i++){
      var c = lines[l][i];
      if(c === '"'){ inQ = !inQ; }
      else if(c === ',' && !inQ){ cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    var obj = {};
    for(var h = 0; h < headers.length; h++) obj[headers[h]] = (cols[h]||'').trim();
    if(obj['Expense ID']) rows.push(obj);
  }
  return rows;
}

function render(){
  var incPD = document.getElementById('tog-pd').checked;
  var showCC = document.getElementById('tog-cc').checked;

  var pdRows = AD.filter(function(r){ return isPD(r) && !isCC(r); });
  var ccRows = AD.filter(isCC);
  var pdTotal = pdRows.reduce(function(s,r){ return s+parseFloat(r['Employee Amount']||0); }, 0);
  var ccTotal = ccRows.reduce(function(s,r){ return s+parseFloat(r['Employee Amount']||0); }, 0);

  document.getElementById('pd-hint').textContent = '₩'+fmt(pdTotal)+' / '+pdRows.length+'건';
  document.getElementById('cc-hint').textContent = ccRows.length+'건 / ₩'+fmt(ccTotal);

  var data = AD.filter(function(r){
    if(isCC(r) && !showCC) return false;
    if(isPD(r) && !incPD) return false;
    return true;
  });

  var total = data.reduce(function(s,r){ return s+parseFloat(r['Employee Amount']||0); }, 0);
  var count = data.length;
  var subs = [];
  if(!showCC) subs.push('Cancelled 제외');
  if(!incPD) subs.push('Per Diem 제외');

  document.getElementById('metrics').innerHTML =
    '<div class="metric"><div class="metric-label">총 청구 금액</div><div class="metric-value large mono">₩'+fmt(total)+'</div><div class="metric-sub">'+(subs.length ? subs.join(' · ') : '전체 포함')+'</div></div>'+
    '<div class="metric"><div class="metric-label">건수</div><div class="metric-value mono">'+count+'건</div></div>'+
    '<div class="metric"><div class="metric-label">건당 평균</div><div class="metric-value mono">₩'+fmt(count>0?total/count:0)+'</div></div>';

  var cats = {};
  data.forEach(function(r){
    var c = getCategory(r);
    cats[c] = (cats[c]||0)+parseFloat(r['Employee Amount']||0);
  });
  var ca = Object.keys(cats).map(function(k){ return [k,cats[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
  var mx = ca.length ? ca[0][1] : 1;
  document.getElementById('cat-bd').innerHTML = ca.map(function(p){
    return '<div class="cat-row">'+
      '<span class="cat-name">'+p[0]+'</span>'+
      '<div class="cat-bar-wrap"><div class="cat-bar" style="width:'+(p[1]/mx*100).toFixed(1)+'%"></div></div>'+
      '<span class="cat-amount">₩'+fmt(p[1])+'</span>'+
      '</div>';
  }).join('');

  var sorted = AD.slice().sort(function(a,b){ return new Date(b['Expense Date'])-new Date(a['Expense Date']); });
  document.getElementById('tbody').innerHTML = sorted.map(function(r){
    var pd=isPD(r), cc=isCC(r);
    var hide=(cc&&!showCC)||(pd&&!incPD);
    var statusClass = (r['Status']||'').toLowerCase().indexOf('approved') !== -1 ? 'badge-approved' : 'badge-review';
    if(cc) statusClass = 'badge-pd';
    return '<tr style="'+(hide?'display:none':'')+'">' +
      '<td class="mono" style="white-space:nowrap;font-size:12px">'+(r['Expense Date']||'-')+'</td>' +
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r['Merchant']||'-')+'</td>' +
      '<td>'+(pd ? '<span class="badge badge-pd">Per Diem</span>' : '<span style="font-size:12px;color:var(--text3)">'+getCategory(r)+'</span>')+'</td>' +
      '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)" title="'+(r['Memo']||'')+'">'+(r['Memo']||'-')+'</td>' +
      '<td class="text-right mono" style="font-weight:500;white-space:nowrap">₩'+fmt(parseFloat(r['Employee Amount']||0))+'</td>' +
      '<td><span class="badge '+statusClass+'">'+(r['Status']||'-')+'</span></td>' +
      '</tr>';
  }).join('');
}

function resetUpload(){
  AD = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('drop-zone').style.display = 'block';
  document.getElementById('tog-pd').checked = true;
  document.getElementById('tog-cc').checked = false;
}

function processFile(file){
  document.getElementById('fname').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e){
    AD = parseCSV(e.target.result);
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    render();
  };
  reader.readAsText(file);
}

document.getElementById('tog-pd').addEventListener('change', render);
document.getElementById('tog-cc').addEventListener('change', render);
document.getElementById('fi').addEventListener('change', function(e){ if(e.target.files[0]) processFile(e.target.files[0]); });

var dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('drag'); });
dz.addEventListener('drop', function(e){
  e.preventDefault(); dz.classList.remove('drag');
  if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
